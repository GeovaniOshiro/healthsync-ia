<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediMind AI | Login Profissional</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <main class="login-container">
        <section class="login-box">
            <div class="logo">
                <i class="fas fa-microchip-medical"></i>
                <h1>Medi<span>Mind</span> AI</h1>
            </div>
            
            <p class="subtitle">Bem-vindo, Doutor(a). Identifique-se para acessar o diagnóstico assistido.</p>

            <form>
                <div class="input-group">
                    <label for="crm">CRM / Registro Profissional</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="crm" placeholder="Ex: 123456-SP" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Senha de Acesso</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember">
                        <input type="checkbox"> Lembrar acesso
                    </label>
                    <a href="#" class="forgot-pass">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-login">
                    Entrar no Sistema
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <footer class="login-footer">
                <p>Novo por aqui? <a href="#">Solicitar credenciais</a></p>
            </footer>
        </section>
    </main>
</body>
</html>
